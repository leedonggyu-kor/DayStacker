workflows:
  ios-native-workflow:
    name: DayStacker iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "DayStacker.xcodeproj"
        XCODE_SCHEME: "DayStacker"
      xcode: latest
    scripts:
      - name: Build (no signing)
        script: |
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
    artifacts:
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - crockkevin1234@gmail.com
        notify:
          success: true
          failure: true
